<div class="mb-3 pb-1">
  <label class="form-label">{{ label }}</label>
  <div class="d-flex align-items-center border rounded tp-wrap"
       data-field="{{ field_name }}"
       style="height:42px;overflow:hidden;background:#fff;width:fit-content;max-width:100%">
    <input type="tel" class="tp-hour border-0 text-center px-2"
           min="1" max="12"
           style="width:52px;outline:none;font-size:15px;font-weight:500">
    <span class="px-1 fw-bold" style="color:#495057">:</span>
    <input type="tel" class="tp-min border-0 text-center px-2"
           min="0" max="59"
           style="width:52px;outline:none;font-size:15px;font-weight:500">
    <div style="width:1px;height:100%;background:#ced4da"></div>
    <button type="button" class="tp-ampm border-0 px-3 h-100 {% if ampm == 'AM' %}tp-active{% endif %}" data-val="AM" style="font-size:13px;font-weight:500">AM</button>
    <button type="button" class="tp-ampm border-0 px-3 h-100 {% if ampm == 'PM' %}tp-active{% endif %}" data-val="PM" style="font-size:13px;font-weight:500">PM</button>
  </div>
  <small class="text-muted mt-1 d-block" style="padding-left:18px">e.g. 01 : 30  PM</small>
  <input type="hidden" name="{{ field_name }}" id="id_{{ field_name }}">
</div>
