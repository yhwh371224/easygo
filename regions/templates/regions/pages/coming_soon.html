<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{{ region.name }} Airport Transfer | Coming Soon | EasyGo</title>
  <meta name="description" content="EasyGo premium airport transfer service is coming to {{ region.name }}. Fixed prices, professional drivers, door-to-door service.">
  <meta name="robots" content="noindex, nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="shortcut icon" type="image/x-icon" href="{% static 'basecamp/favi/favicon.ico' %}">
  <link rel="apple-touch-icon" sizes="180x180" href="{% static 'basecamp/favi/apple-touch-icon.png' %}">
  <link rel="icon" type="image/png" sizes="32x32" href="{% static 'basecamp/favi/favicon-32x32.png' %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css?family=Inter:400,500,600,700&display=swap" rel="stylesheet">
  <style nonce="{{ CSP_NONCE }}">
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #6194ac;
      background-image:
        radial-gradient(ellipse at 15% 40%, rgba(255, 107, 53, 0.12) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 15%, rgba(0, 112, 243, 0.12) 0%, transparent 50%),
        radial-gradient(ellipse at 60% 80%, rgba(99, 102, 241, 0.08) 0%, transparent 50%);
      padding: 2rem 1rem;
    }

    .card {
      width: 100%;
      max-width: 480px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-radius: 20px;
      padding: 3rem 2.5rem 2.5rem;
      text-align: center;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 32px 64px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255,255,255,0.03) inset;
    }

    .logo {
      margin-bottom: 2.25rem;
    }
    .logo img {
      height: 32px;
      width: auto;
      opacity: 0.9;
    }

    .badge {
      display: inline-block;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #1f4b9c;
      background: rgba(88, 110, 230, 0.12);
      border: 1px solid rgba(74, 90, 240, 0.25);
      border-radius: 100px;
      padding: 0.3rem 0.9rem;
      margin-bottom: 1.75rem;
    }

    h1 {
      font-size: clamp(1.6rem, 5vw, 2.1rem);
      font-weight: 700;
      color: #fff;
      line-height: 1.2;
      margin-bottom: 1rem;
    }
    h1 .city {
      background: linear-gradient(90deg, #ff6b35, #ffb347);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      font-size: 1rem;
      color: rgba(255, 255, 255, 0.65);
      line-height: 1.6;
      margin-bottom: 2.5rem;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: linear-gradient(90deg, #ff6b35, #ffb347);
      border-radius: 2px;
      margin: 0 auto 2.5rem;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.82rem;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.6);
      text-decoration: none;
      transition: color 0.2s;
    }
    .back-link:hover { color: rgba(255, 255, 255, 0.75); }
    .back-link::before { content: "←"; }

    @media (max-width: 480px) {
      .card { padding: 2.25rem 1.5rem 2rem; border-radius: 16px; }
    }
  </style>
</head>
<body>

  <div class="card">

    <div class="logo">
      <a href="/">
        <img src="{% static 'basecamp/images/easygo-logo-final.webp' %}" alt="EasyGo Airport Shuttle">
      </a>
    </div>

    <div class="badge">Coming Soon</div>

    <h1>Airport Transfers<br>to <span class="city">{{ region.name }}</span></h1>

    <p class="tagline">We're preparing something great.</p>

    <div class="divider"></div>

    <a href="/" class="back-link">Back to Sydney</a>

  </div>

</body>
</html>
