{% load static %}
<div class="navbar navbar-expand-lg fixed-top navbar-dark bg-primary" id="navbar">
    <div class="container">
        <div class="navbar-brand" style="margin-left: 0;">
            <a href="/"><i class="fad fa-layer-group"></i></a>
            <button class="navbar-toggler ms-n2 me-2" type="button" data-bs-toggle="offcanvas" data-bs-target="#primaryMenu"><span class="navbar-toggler-icon"></span></button><a class="navbar-brand flex-shrink-0 order-lg-1 mx-auto ms-lg-0 pe-lg-2 me-lg-4" href="/"><img class="navbar-floating-logo d-none d-lg-block" src="{% static 'basecamp/images/easygo_icon.webp' %}" style="border-radius: 30%; height: auto; width: 45px" alt="EasyGo_image"></a>
        </div>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarResponsive" aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarResponsive">
            <ul class="navbar-nav">    
                <li class="nav-item">
                    <a class="nav-link" href="/">Home</a>
                </li> 
                <li class="nav-item">
                    <a class="nav-link" href="/easygo_review/">Reivews</a>
                </li> 
                <li class="nav-item">
                    <a class="nav-link" href="/more_suburbs/">Suburbs</a>
                </li>                 
            </ul>

            <ul class="nav navbar-nav ml-auto">                
                {% if email %}
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" data-toggle="dropdown" href="#" id="download">{{ user_name }} <span class="caret"></span></a>
                        <div class="dropdown-menu" aria-labelledby="download">                            
                            <form method="POST" action="/easygo_review/custom_logout/" style="margin:0;">
                                {% csrf_token %}
                                <button type="submit" class="dropdown-item" style="background:none;border:none;width:100%;text-align:left;">Log out</button>
                            </form>
                        </div>
                    </li>
                {% else %}
                    <li class="nav-item">
                        <a href="{% url 'easygo_review:custom_login' %}" class="btn btn-primary">Log in</a>
                    </li>
                {% endif %}
            </ul>

        </div>
    </div>
</div>
