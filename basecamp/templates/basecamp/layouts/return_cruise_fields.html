{% load form_widgets %}
<div class="card text-white bg-secondary p-4" id="return-cruise-fields">
  <h5 class="text-dark mb-3">🛳️ Return Trip</h5>

  <div class="mb-3 pb-1">
    <label class="form-label" id="label-ret-cruise-date">Return Pickup Date</label>
    <input class="form-control date-picker rounded" name="return_pickup_date" type="text" autocomplete="off" placeholder="Choose pickup date" data-datepicker-options='{"altInput": true, "altFormat": "F j, Y", "dateFormat": "Y-m-d", "minDate": "today"}'>
    <div class="invalid-feedback">Please enter your pickup date!</div>
  </div>

  {% time_picker "return_pickup_time" "Return Pickup Time" %}

  <div class="mb-3 pb-1">
    <label class="form-label" for="ret-cruise-start">Return Pickup Location</label>
    <input class="form-control" type="text" name="return_start_point" id="ret-cruise-start">
    <div class="invalid-feedback">Please enter your pickup location!</div>
  </div>

  <div class="mb-3 pb-1">
    <label class="form-label" for="ret-cruise-end">Return Drop-off Location</label>
    <input class="form-control" type="text" name="return_end_point" id="ret-cruise-end">
    <div class="invalid-feedback">Please enter your drop-off location!</div>
  </div>

  <div class="mb-2">
    <div class="form-check">
      <input class="form-check-input" type="checkbox" id="same_extra_stop" name="same_extra_stop" value="1">
      <label class="form-check-label" for="same_extra_stop">Same extra stop(s) as outbound</label>
    </div>
  </div>
</div>
