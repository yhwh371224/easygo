{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Agreement Confirmed – EasyGo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <link rel="shortcut icon" type="image/x-icon" href="{% static 'basecamp/favi/favicon.ico' %}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style> body { background:#111827; color:#e5e7eb; } </style>
</head>
<body>
<section class="py-6">
  <div class="container text-center" style="max-width:520px;">
    <div style="font-size:3rem;line-height:1;">✅</div>
    <h3 class="mt-3">Thank you, {{ driver.driver_name }}</h3>
    <p class="text-secondary">
      Your subcontractor agreement (version {{ version }}) has been recorded.
    </p>
    {% if agreement.confirmed_at %}
    <p class="text-secondary small">
      Confirmed on {{ agreement.confirmed_at|date:"j M Y, g:i A" }}.
    </p>
    {% endif %}
    <p class="mt-4"><a href="/" class="text-secondary text-decoration-none">← Home</a></p>
  </div>
</section>
</body>
</html>
