{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Subcontractor Agreement – EasyGo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <link rel="shortcut icon" type="image/x-icon" href="{% static 'basecamp/favi/favicon.ico' %}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background:#111827; color:#e5e7eb; }
    .agree-card { max-width:640px; margin:0 auto; }
    .agree-item {
      background:#1f2937; border:1px solid #374151; border-radius:10px;
      margin-bottom:1rem; overflow:hidden;
    }
    .agree-item summary {
      list-style:none; cursor:pointer; padding:1rem 1.1rem;
      display:flex; align-items:center; gap:.75rem; font-weight:600;
    }
    .agree-item summary::-webkit-details-marker { display:none; }
    .agree-item summary .chev { margin-left:auto; color:#9ca3af; transition:transform .2s; }
    .agree-item[open] summary .chev { transform:rotate(90deg); }
    .agree-item .detail {
      padding:0 1.1rem 1rem 1.1rem; color:#cbd5e1; font-size:.95rem; line-height:1.5;
    }
    .agree-check {
      display:flex; gap:.6rem; align-items:flex-start;
      padding:.85rem 1.1rem; border-top:1px solid #374151; background:#111827;
    }
    .agree-check input { margin-top:.2rem; width:1.15rem; height:1.15rem; flex:0 0 auto; }
    .agree-check label { font-size:.9rem; color:#e5e7eb; margin:0; }
    .btn-submit {
      background:#f59e0b; color:#fff; border:none; padding:.85rem; width:100%;
      font-size:1rem; font-weight:600; border-radius:8px; cursor:pointer;
      transition:background .2s;
    }
    .btn-submit:hover:not(:disabled) { background:#d97706; }
    .btn-submit:disabled { background:#4b5563; cursor:not-allowed; opacity:.7; }
  </style>
</head>
<body>
<section class="py-5">
  <div class="container agree-card">
    <div class="text-center mb-4">
      <h3 class="mt-3">EasyGo Subcontractor Agreement</h3>
      <p class="text-secondary mb-1">{{ driver.driver_name }}</p>
      <p class="text-secondary small">Version {{ version }} — tap each item to read the detail.</p>
    </div>

    {% if error %}
      <div class="alert alert-danger" role="alert">{{ error }}</div>
    {% endif %}

    <form method="POST" id="agreeForm">
      {% csrf_token %}

      {% for item in items %}
      <div class="agree-item">
        <details>
          <summary>
            <span>{{ item.title }}</span>
            <span class="chev">›</span>
          </summary>
          <div class="detail">{{ item.detail }}</div>
        </details>
        <div class="agree-check">
          <input type="checkbox" name="{{ item.field }}" id="{{ item.field }}"
                 class="agree-input">
          <label for="{{ item.field }}">I have read and agree to the above.</label>
        </div>
      </div>
      {% endfor %}

      <button type="submit" class="btn-submit mt-2" id="confirmBtn" disabled>Confirm</button>
    </form>
  </div>
</section>

<script>
  (function () {
    var boxes = Array.prototype.slice.call(document.querySelectorAll('.agree-input'));
    var btn = document.getElementById('confirmBtn');
    function sync() {
      btn.disabled = !boxes.every(function (b) { return b.checked; });
    }
    boxes.forEach(function (b) { b.addEventListener('change', sync); });
    sync();
    document.getElementById('agreeForm').addEventListener('submit', function () {
      btn.disabled = true;
      btn.textContent = 'Submitting…';
    });
  })();
</script>
</body>
</html>
